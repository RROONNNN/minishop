services:
    rabbitmq:
        image: rabbitmq:4-management
        container_name: minishop-rabbitmq
        restart: unless-stopped
        environment:
            RABBITMQ_DEFAULT_USER: minishop
            RABBITMQ_DEFAULT_PASS: minishop
        ports:
            - '5672:5672'
            - '15672:15672'
        healthcheck:
            test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq

    postgres:
        image: postgres:17-alpine
        container_name: minishop-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: minishop
            POSTGRES_PASSWORD: minishop
            POSTGRES_DB: minishop_order
        ports:
            - '5432:5432'
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'pg_isready -U minishop -d minishop_order',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        volumes:
            - postgres_data:/var/lib/postgresql/data

    mongo:
        image: mongo:8
        container_name: minishop-mongo
        restart: unless-stopped
        environment:
            MONGO_INITDB_ROOT_USERNAME: minishop
            MONGO_INITDB_ROOT_PASSWORD: minishop
        ports:
            - '27017:27017'
        healthcheck:
            test:
                [
                    'CMD',
                    'mongosh',
                    '--eval',
                    "db.adminCommand('ping')",
                    '--quiet',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        volumes:
            - mongo_data:/data/db

volumes:
    rabbitmq_data:
    postgres_data:
    mongo_data: